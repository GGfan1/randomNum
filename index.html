<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style/base/reset.css" />
    <link rel="stylesheet" href="./style/base/main.css" />
    <link rel="stylesheet" href="./style/theme/Dark.css" id="themeLink">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gugi&display=swap"
      rel="stylesheet"
    />
    <title>Random</title>
  </head>
  <body>

    <div class="container">
      <div class="theme">
        <button class="btn active" id="btnDark"></button>
        <button class="btn" id="btnLight"></button>
      </div>
    </div>

    <section class="randomBlock">
      <div class="container">
        <div class="randomDiv">
          <div class="blockNum"><span id="randomNum">0</span></div>
          <span class="spanNum">1/100</span>
          <div class="buttonNum">
            <button class="numbtn" id="btnUp">up</button>
            <button class="numbtn" id="btnDown">down</button>
          </div>
        </div>
      </div>
    </section>

    <script src="./JS/main.js"></script>
  </body>
</html>
